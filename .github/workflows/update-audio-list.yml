name: 自动更新音频并部署站点

on:
  push:
    paths:
      - 'public/audios/**' # 只有当你往这个文件夹上传新录音时触发

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 2. 自动更新 Markdown 音频列表
        run: |
          AUDIOS_LIST=$(ls public/audios | grep '\.mp3$' | awk '{print "  \x27" $0 "\x27,"}')
          MD_FILE="index.md" # 如果你的 index.md 在 docs 目录下，请改为 docs/index.md
          
          awk -v new_list="$AUDIOS_LIST" '
            BEGIN { p=1 }
            /:audios="\[/ { print; print new_list; p=0; next }
            /\]"/ { p=1 }
            p { print }
          ' "$MD_FILE" > temp.md && mv temp.md "$MD_FILE"

      - name: 3. 把修改后的 Markdown 提交回仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.md  # 🔑 这里直接写死 index.md
          # 如果文件有变动就提交，没变动就跳过，防止报错
          git diff-index --quiet HEAD || git commit -m "auto: update audio list in md"
          git push

      - name: 4. 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm' # 如果你用 yarn 或 pnpm，可以改成对应的包管理器

      - name: 5. 安装依赖并打包 VitePress
        run: |
          npm install
          npm run docs:build # 请确保你 package.json 里的打包命令是这个，如果不是请修改

      - name: 6. 部署到 GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .vitepress/dist # 请根据你 VitePress 实际生成的打包目录填写（通常是 docs/.vitepress/dist 或 .vitepress/dist）